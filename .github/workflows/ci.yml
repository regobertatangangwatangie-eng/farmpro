name: Backend CI with Smoke Test

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-app ./backend

      - name: Run Backend Container
        run: docker run -d -p 5000:5000 --name backend-test my-app

      - name: Wait for app
        run: sleep 10

      - name: Smoke Test Backend
        run: curl -f http://localhost:5000/health

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        run: |
          docker tag my-app docker.io/${{ secrets.DOCKERHUB_USERNAME }}/farmpro-backend:latest
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/farmpro-backend:latest